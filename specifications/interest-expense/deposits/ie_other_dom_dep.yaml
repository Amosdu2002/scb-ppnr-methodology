  - {claim: Eq A45 + spread estimation + ELB window 2020:Q2-2021:Q4, pdf_page: 212, md: sec-198}
  - {claim: Eq A46 + items 42B-42D, 79A-81B + median rationale + Eq A47, pdf_page: 213, md: sec-198}
