  - {id: D-005, scope: project_wide, summary: launch point (PQ0) terminology; source words preserved in quotes}
  - {id: PID-OB-1, summary: "PQ0 backsolve identity — SUPERSEDED by PID-OB-5 (2026-07-20)"}
  - {id: PID-OB-2, summary: physical balance = Schedule G 36C + 38 + 39 (Fed-stated 44C/46/47 preserved as FACT scope)}
  - {id: PID-OB-3, summary: "single-PQ0-quarter actuals — SUPERSEDED by PID-OB-5 (2026-07-20)"}
  - {id: PID-OB-4, summary: BBB physical source = project MEV file; four details TO_BE_CONFIRMED before first use}
