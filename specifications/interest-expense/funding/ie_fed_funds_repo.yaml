# Coding-oriented specification — ie_fed_funds_repo (Phase 1; no production code).
# Interest Expense on Federal Funds Purchased and Securities Sold under Agreements to Repurchase
# (proposed 2026 PPNR suite).
# STATUS: PROPOSED for the 2026 stress test (public comment) — NOT adopted.
# Labels: FACT = Fed source-stated (cited); INT = interpretation; PID = user-confirmed project
# decision (never a Fed statement); CODE = coding consideration; UNKNOWN = not stated anywhere
# authoritative — never defaulted. No MDRM codes are stated in v.a(10); none invented.
# Source-integrity notes: (1) the Equation A48 TITLE in the PDF (p. 217) reads "...Securities Sold
# under the Agreement to Purchase" — quirk SQ-10; the component name uses "Repurchase". (2) v.a(10)
# names Schedule G RATE items 44A/44B as "the liabilities reported" — quirk SQ-16; balances are
# 36A/36B per PID-FFR-1. (3) The source's own headings vary: v.a(10) heading "under the Agreement to
# Repurchase" (singular); Table A6 row and section prose "under agreements to repurchase" (plural).
# Citations: (PDF p. N; md sec-M).
# Standardized to specifications/model-spec-guidelines.md at the liability-side integration gate 2026-07-17.

model:
  id: ie_fed_funds_repo
  fed_name: "Interest Expense on Federal Funds Purchased and Securities Sold under Agreements to Repurchase"
    # per the section prose (PDF p. 216) and Table A6 row; the v.a(10) heading itself prints
    # "under the Agreement to Repurchase" (singular) — source-internal variant, recorded, not corrected
  fed_section: B.v.a(10)
  source_pages_pdf: [216, 219]
  source_anchors_md: [sec-205, sec-208]
  model_type: structural                # FACT — Table A6 (PDF pp. 168-169)
  model_form: structural_calculator     # FACT — rate is the contemporaneous 3M Treasury, no transformation
  side: interest_expense
  status: proposed_2026_stress_test__public_comment__NOT_adopted
  estimation: none                      # FACT — "it does not involve coefficients estimation" (PDF p. 218);
                                        # no firm scalar, no deposit beta, no autoregression, no fixed effects
  chapter: handbook/models/interest-expense/funding/ie_fed_funds_repo.md
  review: reviews/interest-expense/funding/ie_fed_funds_repo.review.md
  chapter_review_state: REVIEWED        # independent source-grounding review 2026-07-17 — verdict APPROVE

dimensions:
  firm: b
  time:
    launchpoint_quarter: PQ0            # launch point (source: "lift-off quarter" q0) (D-005)
    projection_quarters: 9              # FACT (PDF p. 6)
  output_grain: [firm, scenario, quarter]
  no_subcomponent_dimension: true       # no dimension survives past the balance aggregation

inputs:
  firm_data:                            # FR Y-14Q, Schedule G, Net Interest Income Worksheet (FACT, PDF pp. 216-217)
    - name: fed_funds_purchased_balance
      fed_item: "44A ('federal funds purchased') — source-stated as the balance (PDF pp. 216-217), but 44A
        is a Schedule G liability RATE item (SQ-16)"       # FACT wording preserved; never used as the mapping
      project_mapping:                  # PID-FFR-1, user-confirmed 2026-07-17 — never a Fed statement
        schedule: FR Y-14Q Schedule G
        item: 36A
      dims: [firm]
      units: USD
      timing: launchpoint, held constant                   # FACT flat-balance (PDF p. 218)
      role: component of the total balance B(b,0)
    - name: repo_sold_balance
      fed_item: "44B ('securities sold under agreements to repurchase') — source-stated as the balance
        (PDF p. 217), but 44B is the foreign-deposits-time RATE item in v.a(9) (PDF p. 215) —
        collision OQ-019 / SQ-16"                          # FACT wording preserved
      project_mapping:                  # PID-FFR-1
        schedule: FR Y-14Q Schedule G
        item: 36B
      dims: [firm]
      units: USD
      timing: launchpoint, held constant
      role: component of the total balance B(b,0)
  scenario:
    - name: usd_3m_treasury
      fed_name: 3-month Treasury yield (Treasury3m)        # FACT role (PDF p. 217) — the model rate itself
      dims: [scenario, quarter]
      units: annualized_rate            # PID D-004; percent-vs-decimal scale normalization: CODE
      timing: q = 1..9 only; no PQ0 value needed (no recursion, no delta)
      enters_via: used directly as the rate — unscaled, untransformed, unlagged
      physical_source: MEV workbook per PID-5 pattern; column name UNCONFIRMED — implementation-mapping TODO (CODE), not a methodology uncertainty

parameters: none                        # FACT — no beta, scalar, spread, floor, or threshold;
                                        # Tables A7-A9 contain no row for this component

transformations:
  balance_aggregation:                  # PID-FFR-1 (user-confirmed 2026-07-17)
    formula: "Balance(b,0) = fed_funds_purchased_balance(b) + repo_sold_balance(b)"   # = 36A + 36B
    note: "the explicit sum is not written in the source; 'Let B_b be the total balance' (PDF p. 217)
      supports it. The source-stated 44A/44B are rate items (SQ-16); v.a(9) itself uses 44B as the
      foreign-time rate and 35-series items for balances (PDF p. 215)"

equations:
  A48_expense:                          # FACT (PDF p. 217), verified against the page image
    source_title_verbatim: "Equation A48 - Interest Expense on Federal Funds Purchased and Securities Sold under the Agreement to Purchase"   # SQ-10, preserved as integrity note only
    formula: "F(b,t) = B(b,t) * Treasury3m(t)"
    projection_form: "F(b,q) = B(b,q) * Treasury3m(q)"
    rate_definition: "Treasury3m is the 3-month Treasury yield for quarter t (FACT verbatim);
      used directly — no spread, no scaling, no lag (FACT: no other term appears in A48)"
  rate_assignment:
    formula: "AnnualizedRate(q) = usd_3m_treasury[q]"      # FACT role; annualized units (PID D-004)
    note: "do NOT divide the Treasury rate before this assignment (PID D-004)"

initial_conditions: none                # no recursion, no delta, no seed — the only PQ0 quantity is the balance

balance_behavior:
  convention: constant_balance          # FACT (PDF p. 218): "B(b,q) = B(b,q0) for all periods"
  detail: "Balance(b,q) = Balance(b,0) for q = 1..9; measured once at the launch point; no growth or runoff"
  varying_over_horizon: [usd_3m_treasury, fed_funds_repo_interest_expense]

constraints_and_floors:
  all: none                             # FACT absence — no floor, cap, or regime; a negative Treasury3m flips
                                        # the expense sign (arithmetically valid under A48) — log, never clamp (CODE)

quarterly_dollar_calculation:
  formula: "QuarterlyExpense(b,q) = Balance(b,0) * AnnualizedRate(q) / 4"
  convention: PID D-004 — annualized rates throughout; divide by 4 only at the final expense step
    (simple nominal quarterization, not compounding)
  source_status: the source states no annual->quarterly conversion for this component (FACT absence,
    preserved; OQ-006 resolution)

outputs:
  - name: fed_funds_repo_interest_expense
    dims: [firm, scenario, quarter]
    units: USD_per_quarter
    description: quarterly dollar interest expense on federal funds purchased and repo

validations:                            # CODE — non-normative; no invented fallbacks
  - missing or negative launchpoint balance in 36A or 36B [PID-FFR-1]
  - launchpoint cross-check — implied expense (36A+36B) x Treasury3m(PQ0) / 4 vs reported rate items 44A/44B x balances (flags item-mapping or scale errors)
  - both balances zero -> expense identically zero (log; likely a reporting gap)
  - usd_3m_treasury present for all q = 1..9 in every scenario
  - negative Treasury rate logged (expense sign flips; arithmetically valid)
  - rate-scale sanity — annualized decimal in a plausible range to catch percent/decimal errors
  - flat-balance invariant — balance identical for all q
  - linearity invariant — expense path exactly proportional to the scenario Treasury3m path (any deviation is a coding error)

dependencies:
  upstream_models: none                 # FACT — shared inputs only (usd_3m_treasury; FR Y-14Q Schedule G)
  current_model_separation: "current Eq A27 (PDF pp. 149-152) uses a firm-specific launch-point
    scalar k_b on FR Y-9C balances; the proposed A48 model has NO scalar — the two must not be mixed"
  asset_side_note: "the approach is equivalent to the asset-side fed-funds-sold treatment, whose
    positions are subsumed within other interest/dividend-bearing assets (FACT, PDF p. 217)"
  hedge_interface: "no hedge term in-model (FACT absence); cross-cutting v.c adjustment (Eqs A49-A51,
    contingent on proposed FR Y-14Q B.2/B.3) may apply later; allocation unresolved (OQ-005)"

project_decisions:                      # user-confirmed; never attributable to the Federal Reserve; registry in handbook/open-questions.md
  - {id: D-004, scope: project_wide, summary: annualized rates; /4 only at the final quarterly-dollar step}
  - {id: D-005, scope: project_wide, summary: launch point (PQ0) terminology; source words preserved in quotes}
  - {id: PID-FFR-1, summary: balance items = 36A + 36B; source-stated 44A/44B are Schedule G rate items (SQ-16), never used as balances}

open_questions:
  open:
    - {id: OQ-005, topic: hedge-adjustment allocation across components}
    - {id: OQ-019, topic: "item 44B double use: foreign-time rate (p. 215) vs repo balance (p. 217) — SQ-16; resolve against Schedule G instructions in the coding phase"}
  resolved_for_project:
    - {id: OQ-006, via: D-004, topic: annualized units; final-step /4}

source_references:
  - {claim: component proposal + short durations + source-stated balance items 44A/44B of the Schedule G NII Worksheet (corrected to 36A/36B by PID-FFR-1), pdf_page: 216-217, md: sec-205}
  - {claim: Equation A48 (title typo SQ-10) + Treasury3m definition + projection form + asset-side equivalence, pdf_page: 217, md: sec-206}
  - {claim: flat balance B(b,q) = B(b,q0) at lift-off, pdf_page: 218, md: sec-206}
  - {claim: assumptions — 3M Treasury rate; special/rare collateral caveat; no-estimation rationale; gross/net reporting discretion, pdf_page: 218, md: sec-207}
  - {claim: Question A180, pdf_page: 218-219, md: sec-208}
  - {claim: Table A6 row (Structural), pdf_page: 168-169, md: sec-148}
  - {claim: "December 2025 revision: p. 216 'federal funds sold' -> 'federal funds purchased'", pdf_page: 4-5, md: sec-0}
  - {claim: nine-quarter horizon, pdf_page: 6, md: sec-2}
  - {claim: current model Eq A27 (comparison only; firm scalar k_b on FR Y-9C balances), pdf_page: 149-152, md: sec-132-134}
