# Coding-oriented specification — ii_other_ida.
# Interest Income on Other Interest/Dividend-Bearing Assets (proposed 2026 PPNR suite).
# STATUS: PROPOSED for the 2026 stress test (public comment) — NOT adopted.
# Labels: FACT = Fed source-stated (cited); INT = interpretation; PID = user-confirmed project
# decision (never a Fed statement); CODE = coding consideration; UNKNOWN = not stated anywhere
# authoritative — never defaulted. The only MDRM code stated in v.a(6) is BHCK3365 (α cross-reference).
# Source-integrity notes: CA-1 — md footnote 66 carries glued text ("Notes: Statistical significance…");
# verified against the PDF page image 2026-07-23: the authoritative footnote ends at "…the 10-year
# Treasury yield." Citations: (PDF p. N; md sec-M).
# Follows specifications/model-spec-guidelines.md (Increment 1, asset side, 2026-07-23).

model:
  id: ii_other_ida
  fed_name: "Interest Income on Other Interest/Dividend-Bearing Assets"
  fed_section: B.v.a(6)
  source_pages_pdf: [205, 209]
  source_anchors_md: [sec-189, sec-192]
  model_type: structural                # FACT — Table A6 (PDF pp. 168-169)
  model_form: structural_calculator_two_rate_blend      # FACT — Eq A43 blends 3M and 10Y Treasury on one balance
  side: interest_income
  status: proposed_2026_stress_test__public_comment__NOT_adopted
  estimation: none                      # FACT — "does not involve coefficients estimation" (PDF p. 208)
  absorbs: "asset-side federal funds sold & reverse repo positions — subsumed per v.a(10) (FACT, PDF p. 217);
    replaces current structural model iv.m(1) for that income (inventory #6; Question A176)"
  chapter: handbook/models/interest-income/calculators/ii_other_ida.md
  review: reviews/interest-income/calculators/ii_other_ida.review.md
  chapter_review_state: REVIEWED        # source-grounding review 2026-07-23 verdict APPROVE; user gate passed 2026-07-23

dimensions:
  firm: b
  time:
    launchpoint_quarter: PQ0            # launch point (source: "lift-off quarter" q0) (D-005)
    projection_quarters: 9              # FACT (PDF p. 6)
  output_grain: [firm, scenario, quarter]
  no_subcomponent_dimension: true       # α splits the single balance inside the equation; nothing reported below component level

inputs:
  firm_data:                            # FR Y-14Q, Schedule G (G.2), Net Interest Income Worksheet (FACT, PDF p. 206)
    - name: other_ida_total_balance
      fed_item: "line item 15 of the Net Interest Income Worksheet of FR Y-14Q, Schedule G (G.2) —
        SOURCE-STATED (PDF p. 206)"
      project_mapping:                  # CODE — physical sheet row TO BE CONFIRMED at company-reference
        sheet: spot                     # D-007; working assumption, candidate PID
        row: "ii_other_ida / total_balance"
        status: TO_BE_CONFIRMED
      dims: [firm]
      units: USD_millions               # D-006
      timing: launchpoint, held constant                 # FACT flat-balance (PDF p. 207)
      role: the single model balance B(b,0)
    - name: other_ida_short_rate_share
      fed_item: "α_b — 'the proportion of assets consisting of federal funds sold and securities purchased
        under agreements to resell'; quantified via 'the additional fields provided by the firms in the
        footnotes to the worksheet' cross-referenced 'with the balances reported in FR Y-9C (BHCK3365)'
        (FACT, PDF p. 206). Derivation mechanics UNSTATED — OQ-024"
      project_mapping:                  # CODE — supplied-input treatment (OQ-024); candidate PID
        sheet: spot
        row: "ii_other_ida / short_rate_share"
        status: TO_BE_CONFIRMED
        treatment: "α supplied directly as a decimal share; upstream derivation is data preparation
          outside the model boundary (precedent: deposit-expense Spread(i,b) supplied-input treatment)"
      dims: [firm]
      units: decimal_share_0_to_1
      timing: launchpoint, held constant                 # FACT flat-share (PDF p. 207)
      role: weight on the 3M-Treasury leg; (1 - α) weights the 10Y leg

  scenario:
    - name: usd_3m_treasury
      fed_name: 3-month Treasury yield (Treasury3m)      # FACT role (PDF pp. 206-207) — rate on the α share
      dims: [scenario, quarter]
      units: annualized_rate            # PID D-004
      timing: q = 1..9 only; no PQ0 value needed
      enters_via: used directly on the α share — unscaled, untransformed, unlagged
      physical_source: MEV workbook per PID-5 pattern; column name UNCONFIRMED (shared with expense side) — CODE
    - name: usd_10y_treasury
      fed_name: 10-year Treasury yield (Treasury10y)     # FACT role (PDF pp. 206-207) — rate on the (1-α) share
      dims: [scenario, quarter]
      units: annualized_rate            # PID D-004
      timing: q = 1..9 only; no PQ0 value needed
      enters_via: used directly on the (1 - α) share — unscaled, untransformed, unlagged
      physical_source: MEV workbook per PID-5 pattern; NEW canonical series — column name UNCONFIRMED — CODE

parameters: none                        # FACT — no beta, scalar, spread, floor, or threshold;
                                        # Tables A7-A9 contain no row for this component.
                                        # α is a firm-data input, not a parameter

transformations: none                   # the blended rate is an equations restatement (CODE), not a standalone derivation

equations:
  A43_income:                           # FACT (PDF p. 207), verified against the page image 2026-07-23
    source_title_verbatim: "Equation A43 - Interest Income on Other Interest/Dividend-Bearing Assets"
    formula: "F(b,t) = alpha(b,t) * B(b,t) * Treasury3m + (1 - alpha(b,t)) * B(b,t) * Treasury10y"
      # faithful-transcription note: the A43 display carries NO time subscript on the Treasury terms;
      # the projection form adds them — both match the page image; the projection form governs
    projection_form: "F(b,q) = alpha(b,q) * B(b,q) * Treasury3m(q) + (1 - alpha(b,q)) * B(b,q) * Treasury10y(q)"
    rate_definition: "Treasury3m is the 3-month Treasury yield; Treasury10y is the 10-year Treasury
      yield (FACT verbatim where-list); both used raw — no spread, no scaling, no lag, NO 6% cap
      (footnote 66's 'lesser of six percent and the 10-year Treasury yield' is rationale for the
      10Y choice, not model mechanics — FACT: no cap term appears in A43)"
  blended_rate_restatement:             # CODE — algebraically identical convenience form
    formula: "BlendedRate(b,q) = alpha(b,0) * Treasury3m(q) + (1 - alpha(b,0)) * Treasury10y(q);
      income = B(b,0) * BlendedRate(b,q)"
    note: "diagnostic decomposition only; not a separate Fed quantity"

initial_conditions: none                # no recursion, no delta, no seed — PQ0 quantities are the balance and α

balance_behavior:
  convention: constant_balance_and_share                 # FACT (PDF p. 207)
  detail: "Balance(b,q) = Balance(b,0) and alpha(b,q) = alpha(b,0) for q = 1..9; both measured once
    at the launch point — 'The share α(b,q) = α(b,q0) is also assumed to stay constant over the
    projection quarters' (FACT verbatim)"
  varying_over_horizon: [usd_3m_treasury, usd_10y_treasury, other_ida_interest_income]

constraints_and_floors:
  all: none                             # FACT absence — no floor, cap (incl. no 6% FRB-stock cap), or regime;
                                        # negative Treasury legs flip income sign — log, never clamp (CODE)

quarterly_dollar_calculation:
  formula: "QuarterlyIncome(b,q) = Balance(b,0) * [alpha(b,0)*Treasury3m(q) + (1-alpha(b,0))*Treasury10y(q)] / 4"
  convention: PID D-004 — annualized rates throughout; divide by 4 only at the final income step
    (simple nominal quarterization, not compounding)
  source_status: the source states no annual->quarterly conversion for this component (FACT absence,
    preserved; OQ-006 resolution)

outputs:
  - name: other_ida_interest_income
    dims: [firm, scenario, quarter]
    units: USD_millions_per_quarter     # D-006
    description: quarterly dollar interest income on other interest/dividend-bearing assets
  - name: other_ida_blended_rate       # CODE diagnostic
    dims: [firm, scenario, quarter]
    units: annualized_rate
    description: diagnostic blended rate alpha*T3m + (1-alpha)*T10y

validations:                            # CODE — non-normative; no invented fallbacks
  - missing or negative launchpoint balance in item 15
  - balance zero -> income identically zero (log; likely a reporting gap)
  - alpha present and in [0,1] — violations surface as errors, never clipped; log at exactly 0 or 1
    (source says fed funds sold "comprise most" of the component — alpha near 0 is suspicious)
  - usd_3m_treasury and usd_10y_treasury present for all q = 1..9 in every scenario
  - negative Treasury rates logged (income legs can flip sign; arithmetically valid)
  - rate-scale sanity — annualized decimals in a plausible range to catch percent/decimal errors
  - flat-balance and flat-share invariants — balance and alpha identical for all q
  - blend-bounds invariant — for alpha in [0,1], the blended rate lies between min and max of the two
    Treasury yields each quarter (any deviation is a coding error)
  - bilinearity invariant — income path is the affine combination of the two Treasury paths with
    weights alpha*B/4 and (1-alpha)*B/4

dependencies:
  upstream_models: none                 # FACT — shared inputs only (Schedule G item 15; footnote-field share; two Treasury series)
  current_model_separation: "current approach is a panel regression (FACT via Question A175 wording,
    PDF p. 208); current-suite mechanics out of scope — the two must not be mixed"
  expense_side_mirror: "v.a(10): the approach 'is equivalent to the one previously described for
    interest income on federal funds sold…, except that the federal funds and repo positions on the
    asset side are subsumed within the component other interest/dividend-bearing assets'
    (FACT, PDF p. 217) — structural symmetry with ie_fed_funds_repo, not a compute dependency"
  hedge_interface: "no hedge term in-model (FACT absence); cross-cutting v.c adjustment may apply
    later; allocation unresolved (OQ-005)"
  family_interface: "income path feeds asset-side aggregation and the reconciliation monitor against
    frb_total_interest_income (project input, OQ-023 narrowing — never a Fed statement)"

project_decisions:                      # user-confirmed; never attributable to the Federal Reserve; registry in handbook/open-questions.md
  - {id: D-004, scope: project_wide, summary: annualized rates; /4 only at the final quarterly-dollar step}
  - {id: D-005, scope: project_wide, summary: launch point (PQ0) terminology; source words preserved in quotes}
  - {id: D-006, scope: project_wide, summary: canonical money unit USD millions; declared scale at ingestion}
  - {id: D-007, scope: project_wide, summary: two-sheet firm-input contract (spot + wide quarterly)}
  - {id: D-009, scope: project_wide, summary: compact 13-section chapter skeleton (this model's chapter follows it)}

open_questions:
  open:
    - {id: OQ-005, topic: hedge-adjustment allocation across components}
    - {id: OQ-024, topic: "α derivation mechanics (worksheet footnote fields; BHCK3365 cross-reference)
        unstated; project treatment: α supplied as a launch-point decimal-share input — filed 2026-07-23"}
  resolved_for_project:
    - {id: OQ-006, via: D-004, topic: annualized units; final-step /4}
  pending_confirmations:                # CODE TODOs — candidate PIDs at company-reference verification
    - physical firm-sheet rows for the item 15 balance and the α share
    - MEV workbook column names for usd_3m_treasury (shared) and usd_10y_treasury (new series)

